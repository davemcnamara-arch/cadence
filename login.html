<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - Cadence</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .btn-full {
      width: 100%;
      padding: 0.75rem;
      font-size: 0.9375rem;
    }

    /* Role selector */
    .role-selector {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }

    .role-card {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      padding: 1rem 0.75rem;
      border: 2px solid var(--border-color);
      border-radius: var(--border-radius);
      background: var(--bg-primary);
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
      text-align: center;
    }

    .role-card:hover {
      border-color: var(--primary-color);
      background: rgba(99, 102, 241, 0.04);
    }

    .role-card.selected {
      border-color: var(--primary-color);
      background: rgba(99, 102, 241, 0.08);
    }

    .role-card .role-icon {
      font-size: 1.75rem;
      line-height: 1;
    }

    .role-card strong {
      display: block;
      font-size: 0.9375rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .role-card span {
      display: block;
      font-size: 0.75rem;
      color: var(--text-secondary);
      line-height: 1.3;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      font-size: 0.875rem;
      color: var(--text-secondary);
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      padding: 0;
      margin-bottom: 1rem;
    }

    .back-link:hover {
      color: var(--text-primary);
    }

    .signin-context {
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin-bottom: 1.25rem;
    }

    .signin-context strong {
      color: var(--text-primary);
    }
  </style>
</head>
<body>
  <div class="login-screen">
    <div class="login-container">
      <div class="logo">
        <h1>🎵 Cadence</h1>
        <p class="tagline">Music learning platform: <span style="white-space: nowrap">student choice, teacher insight.</span></p>
      </div>

      <!-- Step 1: Role selection -->
      <div class="login-card" id="step-role">
        <h2>Welcome</h2>
        <p>How will you be using Cadence?</p>

        <div class="role-selector">
          <button class="role-card selected" data-role="student" id="role-student">
            <div class="role-icon">🎓</div>
            <strong>I'm a student</strong>
            <span>Learn and track your musical progress</span>
          </button>
          <button class="role-card" data-role="teacher" id="role-teacher">
            <div class="role-icon">👨‍🏫</div>
            <strong>I'm a teacher</strong>
            <span>Free 90-day trial — no credit card needed</span>
          </button>
        </div>

        <button id="continue-btn" class="btn btn-primary btn-full">
          Continue
        </button>

        <p class="privacy-link" style="text-align:center; margin-top: 1.25rem;">
          <a href="privacy.html" target="_blank">Privacy Policy</a>
        </p>
      </div>

      <!-- Step 2: Sign in -->
      <div class="login-card hidden" id="step-oauth">
        <button class="back-link" id="back-btn">&#8592; Back</button>

        <h2>Sign in</h2>
        <p class="signin-context" id="signin-context"></p>

        <button id="google-oauth-btn" class="btn btn-primary btn-google btn-full">
          <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            <path fill="none" d="M0 0h48v48H0z"/>
          </svg>
          Sign in with Google
        </button>

        <div class="auth-divider"><span>or use email</span></div>

        <form id="email-auth-form" novalidate>
          <div class="form-group hidden" id="auth-name-group">
            <label for="auth-name">Name</label>
            <input type="text" id="auth-name" autocomplete="name" placeholder="Your name">
          </div>
          <div class="form-group">
            <label for="auth-email">Email</label>
            <input type="email" id="auth-email" autocomplete="email" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label for="auth-password">Password</label>
            <input type="password" id="auth-password" autocomplete="current-password" placeholder="Password" minlength="6" required>
          </div>
          <p class="auth-message hidden" id="auth-message"></p>
          <button type="submit" id="email-auth-submit" class="btn btn-secondary btn-full">Sign in with email</button>
        </form>

        <p class="auth-toggle" id="forgot-password-row">
          <button type="button" id="forgot-password-btn" class="btn-link-add">Forgot password?</button>
        </p>

        <p class="auth-toggle">
          <span id="auth-toggle-prompt">Don't have an account?</span>
          <button type="button" id="auth-toggle-btn" class="btn-link-add">Create one</button>
        </p>

        <p class="privacy-link" style="text-align:center; margin-top: 1.25rem;">
          <a href="privacy.html" target="_blank">Privacy Policy</a>
        </p>
      </div>
    </div>
  </div>

  <script type="module">
    import { supabase } from './js/config.js';

    const presetRole = new URLSearchParams(window.location.search).get('role');

    (async () => {
      // If already signed in, skip to the app
      const { data: { session } } = await supabase.auth.getSession();
      if (session) {
        window.location.href = 'app.html';
        return;
      }

      // Skip role selection if role is preset via URL param (e.g. ?role=student)
      if (presetRole) {
        selectedRole = presetRole;
        const label = presetRole === 'teacher' ? 'Signing in as a <strong>teacher</strong>' : 'Signing in as a <strong>student</strong>';
        document.getElementById('signin-context').innerHTML = label;
        document.getElementById('step-role').classList.add('hidden');
        document.getElementById('step-oauth').classList.remove('hidden');
      }
    })();

    let selectedRole = 'student';

    // Role card selection
    const roleCards = document.querySelectorAll('.role-card');
    roleCards.forEach(card => {
      card.addEventListener('click', () => {
        roleCards.forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        selectedRole = card.dataset.role;
      });
    });

    // Step 1 → Step 2
    document.getElementById('continue-btn').addEventListener('click', () => {
      const label = selectedRole === 'teacher' ? 'Signing in as a <strong>teacher</strong>' : 'Signing in as a <strong>student</strong>';
      document.getElementById('signin-context').innerHTML = label;
      document.getElementById('step-role').classList.add('hidden');
      document.getElementById('step-oauth').classList.remove('hidden');
    });

    // Step 2 → Step 1 (back)
    document.getElementById('back-btn').addEventListener('click', () => {
      document.getElementById('step-oauth').classList.add('hidden');
      document.getElementById('step-role').classList.remove('hidden');
    });

    // Google OAuth: store role then initiate OAuth flow
    document.getElementById('google-oauth-btn').addEventListener('click', async () => {
      localStorage.setItem('cadence_signup_role', selectedRole);
      await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: window.location.origin + '/app.html',
          queryParams: { prompt: 'select_account' }
        }
      });
    });

    // Email/password sign in vs. create account
    let authMode = 'signin';

    const authNameGroup = document.getElementById('auth-name-group');
    const authSubmitBtn = document.getElementById('email-auth-submit');
    const authTogglePrompt = document.getElementById('auth-toggle-prompt');
    const authToggleBtn = document.getElementById('auth-toggle-btn');
    const authPasswordInput = document.getElementById('auth-password');
    const authMessage = document.getElementById('auth-message');
    const forgotPasswordRow = document.getElementById('forgot-password-row');
    const forgotPasswordBtn = document.getElementById('forgot-password-btn');

    function setAuthMessage(text, isError) {
      authMessage.textContent = text;
      authMessage.classList.toggle('hidden', !text);
      authMessage.classList.toggle('error', !!isError);
    }

    function updateAuthModeUI() {
      setAuthMessage('', false);
      if (authMode === 'signup') {
        authNameGroup.classList.remove('hidden');
        authSubmitBtn.textContent = 'Create account';
        authTogglePrompt.textContent = 'Already have an account?';
        authToggleBtn.textContent = 'Sign in';
        authPasswordInput.autocomplete = 'new-password';
        authPasswordInput.placeholder = 'At least 6 characters';
        forgotPasswordRow.classList.add('hidden');
      } else {
        authNameGroup.classList.add('hidden');
        authSubmitBtn.textContent = 'Sign in with email';
        authTogglePrompt.textContent = "Don't have an account?";
        authToggleBtn.textContent = 'Create one';
        authPasswordInput.autocomplete = 'current-password';
        authPasswordInput.placeholder = 'Password';
        forgotPasswordRow.classList.remove('hidden');
      }
    }

    authToggleBtn.addEventListener('click', () => {
      authMode = authMode === 'signin' ? 'signup' : 'signin';
      updateAuthModeUI();
    });

    function friendlyAuthError(error) {
      const msg = (error?.message || '').toLowerCase();
      if (msg.includes('invalid login credentials')) {
        return 'Incorrect email or password.';
      }
      if (msg.includes('already registered') || msg.includes('already exists')) {
        return 'An account with this email already exists. Try signing in instead.';
      }
      if (msg.includes('password') && (msg.includes('least') || msg.includes('short'))) {
        return 'Password must be at least 6 characters.';
      }
      if (msg.includes('email') && msg.includes('invalid')) {
        return 'Please enter a valid email address.';
      }
      return error?.message || 'Something went wrong. Please try again.';
    }

    document.getElementById('email-auth-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      setAuthMessage('', false);

      const email = document.getElementById('auth-email').value.trim();
      const password = authPasswordInput.value;
      const name = document.getElementById('auth-name').value.trim();

      if (!email || !password) {
        setAuthMessage('Please enter your email and password.', true);
        return;
      }
      if (password.length < 6) {
        setAuthMessage('Password must be at least 6 characters.', true);
        return;
      }

      const originalLabel = authSubmitBtn.textContent;
      authSubmitBtn.disabled = true;
      authSubmitBtn.textContent = authMode === 'signup' ? 'Creating account…' : 'Signing in…';

      localStorage.setItem('cadence_signup_role', selectedRole);

      try {
        if (authMode === 'signup') {
          const { data, error } = await supabase.auth.signUp({
            email,
            password,
            options: {
              data: { full_name: name || email.split('@')[0] },
              emailRedirectTo: window.location.origin + '/app.html'
            }
          });

          if (error) {
            setAuthMessage(friendlyAuthError(error), true);
            return;
          }

          if (data.session) {
            window.location.href = 'app.html';
            return;
          }

          // No session returned — email confirmation is still enabled in Supabase
          authMode = 'signin';
          updateAuthModeUI();
          setAuthMessage('Account created! Check your email to confirm your account, then sign in.', false);
        } else {
          const { data, error } = await supabase.auth.signInWithPassword({ email, password });

          if (error) {
            setAuthMessage(friendlyAuthError(error), true);
            return;
          }

          if (data.session) {
            window.location.href = 'app.html';
            return;
          }
        }
      } catch (err) {
        setAuthMessage('Something went wrong. Please try again.', true);
      } finally {
        authSubmitBtn.disabled = false;
        authSubmitBtn.textContent = originalLabel;
      }
    });

    // Forgot password: send a reset link to the entered email
    forgotPasswordBtn.addEventListener('click', async () => {
      const email = document.getElementById('auth-email').value.trim();
      if (!email) {
        setAuthMessage('Enter your email address above, then click "Forgot password?".', true);
        return;
      }

      const originalLabel = forgotPasswordBtn.textContent;
      forgotPasswordBtn.disabled = true;
      forgotPasswordBtn.textContent = 'Sending…';

      try {
        await supabase.auth.resetPasswordForEmail(email, {
          redirectTo: window.location.origin + '/reset-password.html'
        });
      } catch (err) {
        // Ignore - always show the same message below regardless of outcome
      }

      // Always show a generic confirmation, regardless of whether the
      // account exists, to avoid leaking which emails are registered.
      setAuthMessage("If an account exists for that email, we've sent a password reset link.", false);
      forgotPasswordBtn.disabled = false;
      forgotPasswordBtn.textContent = originalLabel;
    });
  </script>
</body>
</html>
