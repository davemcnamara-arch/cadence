<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - Cadence</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 0.375rem;
    }

    .form-group input {
      width: 100%;
      padding: 0.625rem 0.75rem;
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius);
      font-size: 0.875rem;
      font-family: inherit;
      transition: var(--transition);
      background: var(--bg-primary);
      color: var(--text-primary);
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    .btn-full {
      width: 100%;
      padding: 0.75rem;
      font-size: 0.9375rem;
    }

    .error-banner {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #b91c1c;
      border-radius: var(--border-radius);
      padding: 0.75rem 1rem;
      font-size: 0.875rem;
      margin-bottom: 1rem;
    }

    .signup-prompt {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    .signup-prompt a {
      color: var(--primary-color);
      text-decoration: none;
      font-weight: 500;
    }

    .signup-prompt a:hover {
      text-decoration: underline;
    }

    /* Role selector */
    .role-selector {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }

    .role-card {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      padding: 1rem 0.75rem;
      border: 2px solid var(--border-color);
      border-radius: var(--border-radius);
      background: var(--bg-primary);
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
      text-align: center;
    }

    .role-card:hover {
      border-color: var(--primary-color);
      background: rgba(99, 102, 241, 0.04);
    }

    .role-card.selected {
      border-color: var(--primary-color);
      background: rgba(99, 102, 241, 0.08);
    }

    .role-card .role-icon {
      font-size: 1.75rem;
      line-height: 1;
    }

    .role-card strong {
      display: block;
      font-size: 0.9375rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .role-card span {
      display: block;
      font-size: 0.75rem;
      color: var(--text-secondary);
      line-height: 1.3;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1rem 0;
      color: var(--text-secondary);
      font-size: 0.8125rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-top: 1px solid var(--border-color);
    }
  </style>
</head>
<body>
  <div class="login-screen">
    <div class="login-container">
      <div class="logo">
        <h1>🎵 Cadence</h1>
        <p class="tagline">Track Your Musical Journey</p>
      </div>
      <div class="login-card">
        <h2>Welcome</h2>
        <p>How will you be using Cadence?</p>

        <!-- Role selector -->
        <div class="role-selector" id="role-selector">
          <button class="role-card selected" data-role="student" id="role-student">
            <div class="role-icon">🎓</div>
            <strong>I'm a student</strong>
            <span>Learn and track your musical progress</span>
          </button>
          <button class="role-card" data-role="teacher" id="role-teacher">
            <div class="role-icon">👨‍🏫</div>
            <strong>I'm a teacher</strong>
            <span>Create classes and guide students</span>
          </button>
        </div>

        <!-- Google OAuth button -->
        <button id="google-oauth-btn" class="btn btn-primary btn-google btn-full">
          <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            <path fill="none" d="M0 0h48v48H0z"/>
          </svg>
          Sign in with Google
        </button>

        <div class="divider">or sign in with email</div>

        <div id="error-banner" class="error-banner hidden"></div>

        <form id="login-form">
          <div class="form-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="you@example.com"
              required
              autocomplete="email"
            >
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              required
              autocomplete="current-password"
            >
          </div>
          <button type="submit" id="submit-btn" class="btn btn-primary btn-full">
            Sign In
          </button>
        </form>

        <div class="signup-prompt">
          No account yet? <a href="subscribe.html">Subscribe to get started</a>
        </div>

        <p class="privacy-link" style="text-align:center;">
          <a href="privacy.html" target="_blank">Privacy Policy</a>
        </p>
      </div>
    </div>
  </div>

  <script type="module">
    import { supabase, SUPABASE_URL, SUPABASE_ANON_KEY } from './js/config.js';

    // If already signed in, skip to the app
    (async () => {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) {
        window.location.href = 'index.html';
      }
    })();

    // Role selection state (default: student)
    let selectedRole = 'student';

    const roleCards = document.querySelectorAll('.role-card');
    roleCards.forEach(card => {
      card.addEventListener('click', () => {
        roleCards.forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        selectedRole = card.dataset.role;
      });
    });

    // Google OAuth: store role then initiate OAuth flow
    document.getElementById('google-oauth-btn').addEventListener('click', async () => {
      localStorage.setItem('cadence_signup_role', selectedRole);
      await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: window.location.origin,
          queryParams: { prompt: 'select_account' }
        }
      });
    });

    // Email / password form (existing teacher sign-in)
    const form = document.getElementById('login-form');
    const submitBtn = document.getElementById('submit-btn');
    const errorBanner = document.getElementById('error-banner');

    function showError(msg) {
      errorBanner.textContent = msg;
      errorBanner.classList.remove('hidden');
    }

    function clearError() {
      errorBanner.classList.add('hidden');
      errorBanner.textContent = '';
    }

    function setLoading(loading) {
      submitBtn.disabled = loading;
      submitBtn.textContent = loading ? 'Signing in\u2026' : 'Sign In';
    }

    async function getSubscription(accessToken) {
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_my_subscription`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${accessToken}`
          },
          body: JSON.stringify({})
        });
        if (!res.ok) return null;
        const text = await res.text();
        return text ? JSON.parse(text) : null;
      } catch {
        return null;
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();
      setLoading(true);

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const { data, error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        setLoading(false);
        const msg = error.message || '';
        if (/invalid login credentials|invalid.*credentials|wrong.*password/i.test(msg)) {
          showError('Incorrect email or password. Please try again.');
        } else if (/email not confirmed/i.test(msg)) {
          showError('Please confirm your email address before signing in.');
        } else {
          showError(msg || 'Sign in failed. Please try again.');
        }
        return;
      }

      const accessToken = data.session?.access_token;
      const subscription = accessToken ? await getSubscription(accessToken) : null;
      const status = subscription?.status;

      if (status === 'active' || status === 'trialing') {
        window.location.href = 'index.html';
      } else if (status === 'expired' || status === 'cancelled') {
        // Has a subscription but it lapsed — show the renewal banner
        window.location.href = 'subscribe.html?expired=1';
      } else {
        // No subscription record at all — send to subscribe page without the
        // misleading "your subscription has expired" banner
        window.location.href = 'subscribe.html';
      }
    });
  </script>
</body>
</html>
