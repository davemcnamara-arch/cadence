<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Cadence</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .btn-full {
      width: 100%;
      padding: 0.75rem;
      font-size: 0.9375rem;
    }
  </style>
</head>
<body>
  <div class="login-screen">
    <div class="login-container">
      <div class="logo">
        <h1>🎵 Cadence</h1>
        <p class="tagline">Music learning platform: <span style="white-space: nowrap">student choice, teacher insight.</span></p>
      </div>

      <!-- Set new password -->
      <div class="login-card hidden" id="reset-card">
        <h2>Reset your password</h2>
        <p>Enter a new password for your account.</p>

        <form id="reset-form" novalidate>
          <div class="form-group">
            <label for="reset-password">New password</label>
            <input type="password" id="reset-password" autocomplete="new-password" placeholder="At least 6 characters" minlength="6" required>
          </div>
          <div class="form-group">
            <label for="reset-password-confirm">Confirm new password</label>
            <input type="password" id="reset-password-confirm" autocomplete="new-password" placeholder="Confirm password" minlength="6" required>
          </div>
          <p class="auth-message hidden" id="reset-message"></p>
          <button type="submit" id="reset-submit" class="btn btn-primary btn-full">Update password</button>
        </form>
      </div>

      <!-- Link missing/expired -->
      <div class="login-card hidden" id="reset-invalid-card">
        <h2>Link expired</h2>
        <p>This password reset link is invalid or has expired. Request a new one from the sign-in page.</p>
        <a href="login.html"><button class="btn btn-primary btn-full">Back to sign in</button></a>
      </div>

      <!-- Checking link -->
      <div class="login-card" id="reset-checking-card">
        <h2>Checking your link…</h2>
        <p>Please wait a moment.</p>
      </div>
    </div>
  </div>

  <script type="module">
    import { supabase } from './js/config.js';

    const checkingCard = document.getElementById('reset-checking-card');
    const resetCard = document.getElementById('reset-card');
    const invalidCard = document.getElementById('reset-invalid-card');

    function showCard(card) {
      [checkingCard, resetCard, invalidCard].forEach(c => c.classList.add('hidden'));
      card.classList.remove('hidden');
    }

    // Supabase parses the recovery token from the URL hash and fires
    // a PASSWORD_RECOVERY event once the recovery session is ready.
    supabase.auth.onAuthStateChange((event) => {
      if (event === 'PASSWORD_RECOVERY') {
        showCard(resetCard);
      }
    });

    (async () => {
      const { data: { session } } = await supabase.auth.getSession();
      if (session && window.location.hash.includes('type=recovery')) {
        showCard(resetCard);
        return;
      }

      // Give onAuthStateChange a moment to fire for the recovery link
      setTimeout(() => {
        if (checkingCard.classList.contains('hidden')) return; // already handled
        showCard(invalidCard);
      }, 2000);
    })();

    function setMessage(text, isError) {
      const el = document.getElementById('reset-message');
      el.textContent = text;
      el.classList.toggle('hidden', !text);
      el.classList.toggle('error', !!isError);
    }

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      setMessage('', false);

      const password = document.getElementById('reset-password').value;
      const confirm = document.getElementById('reset-password-confirm').value;

      if (password.length < 6) {
        setMessage('Password must be at least 6 characters.', true);
        return;
      }
      if (password !== confirm) {
        setMessage('Passwords do not match.', true);
        return;
      }

      const submitBtn = document.getElementById('reset-submit');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Updating…';

      const { error } = await supabase.auth.updateUser({ password });

      if (error) {
        setMessage(error.message || 'Something went wrong. Please try again.', true);
        submitBtn.disabled = false;
        submitBtn.textContent = 'Update password';
        return;
      }

      setMessage('Password updated! Redirecting…', false);
      setTimeout(() => { window.location.href = 'app.html'; }, 1200);
    });
  </script>
</body>
</html>
